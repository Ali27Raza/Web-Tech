<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Task Loader</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        color: #333;
        text-align: center;
      }
      .task-list {
        margin-bottom: 20px;
      }
      .task-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #ddd;
      }
      .view-btn {
        background-color: #4caf50;
        color: white;
        border: none;
        padding: 8px 16px;
        cursor: pointer;
        border-radius: 4px;
      }
      .view-btn:hover {
        background-color: rgb(2, 82, 6);
      }
      .iframe-container {
        width: 100%;
        margin-top: 20px;
        border: 1px solid #ddd;
        border-radius: 5px;
        overflow: hidden;
      }
      iframe {
        border: none;
        width: 100%;
        height: 600px;
      }
    </style>
  </head>
  <body>
    <h1>Dynamic Task Loader</h1>

    <div class="task-list">
      <div class="task-item">
        <span>Assignment 1: CV using HTML & CSS</span>
        <button class="view-btn" onclick="loadTask('assignment_1/index.html')">
          View
        </button>
      </div>
      <div class="task-item">
        <span>Assignment 2: E-Commerce Landing Page</span>
        <button class="view-btn" onclick="loadTask('assignment_2/index.html')">
          View
        </button>
      </div>
      <div class="task-item">
        <span>Lab Task 1: Landing Page using Bootstrap</span>
        <button class="view-btn" onclick="loadTask('lab_task_1/index.html')">
          View
        </button>
      </div>
      <div class="task-item">
        <span>Lab Task 2: Checkout Page with Validation</span>
        <button class="view-btn" onclick="loadTask('lab_task_2/index.html')">
          View
        </button>
      </div>
    </div>

    <div class="iframe-container">
      <iframe id="taskFrame" src="about:blank"></iframe>
    </div>

    <script>
      function loadTask(url) {
        document.getElementById("taskFrame").src = url;
      }
    </script>
  </body>
</html>
